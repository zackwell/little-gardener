<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1f2e" />
    <title>凑十消除 · 练习版（静态）</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div class="stat">
          <span class="label">得分</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat stat-center">
          <span class="label">框内数字和</span>
          <strong id="sum">0</strong>
        </div>
        <div class="stat stat-right">
          <span class="label">剩余</span>
          <strong id="time">60</strong>
          <span class="unit">秒</span>
        </div>
      </header>

      <p class="hint">
        按住拖动拉出<strong>矩形框</strong>，框内所有数字之和恰好为 <strong>10</strong> 松手即可消除；消去的格子<strong>不会补充</strong>新数字，清空全盘或限时结束即本局结束。
      </p>

      <main class="board-wrap">
        <div id="board" class="board" aria-label="游戏棋盘"></div>
      </main>

      <footer class="bottom">
        <button type="button" id="restart" class="btn">再来一局</button>
      </footer>
    </div>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
      <div class="modal">
        <h2 id="overlay-title">时间到</h2>
        <p class="modal-score">本局得分：<strong id="final-score">0</strong></p>
        <button type="button" id="overlay-restart" class="btn">再玩一次</button>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
